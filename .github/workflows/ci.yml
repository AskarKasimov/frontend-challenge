name: CI + Deploy to GitHub Pages

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 25.x
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
          cache: yarn
          cache-dependency-path: ./catty-frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: ./catty-frontend

      - name: Run lint
        run: yarn lint
        working-directory: ./catty-frontend

      - name: Generate Tanstack Router
        run: yarn gen
        working-directory: ./catty-frontend

      - name: Build
        run: yarn build
        working-directory: ./catty-frontend
        env:
          VITE_BASE_PATH: /frontend-challenge/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: ./catty-frontend/dist

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-build
          path: ./dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
